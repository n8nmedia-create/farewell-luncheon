<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farewell Luncheon — Organizer Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1c1917;--cream:#faf7f2;--warm:#f5f0e8;--border:#e2d9cc;--gold:#b8873a;--gold-lt:#f0e6d0;--red:#c0392b;--muted:#7a6f63;--green:#27ae60;--green-lt:#eafaf1;--orange:#e67e22;--orange-lt:#fef9e7;--radius:6px;--navy:#1a1a2e;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:#f0ede8;color:var(--ink);min-height:100vh;}
  #auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--navy);}
  .auth-box{background:#fff;border-radius:12px;padding:40px 36px;max-width:380px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3);}
  .auth-logo{font-size:36px;margin-bottom:16px;}
  .auth-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;margin-bottom:6px;}
  .auth-sub{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.5;}
  .auth-error{font-size:12px;color:var(--red);background:#fdf0ef;border:1px solid #f5c6c2;border-radius:var(--radius);padding:10px 14px;margin-bottom:16px;display:none;}
  .auth-error.show{display:block;}
  .auth-spinner{display:flex;align-items:center;justify-content:center;gap:10px;color:var(--muted);font-size:13px;}
  .spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
  .spinner.lg{width:36px;height:36px;border-width:3px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  #dashboard{display:none;}
  .topbar{background:var(--navy);color:var(--cream);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(0,0,0,.2);}
  .topbar-left{display:flex;align-items:center;gap:14px;}
  .topbar-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;}
  .topbar-badge{font-size:10px;background:rgba(184,135,58,.2);color:var(--gold);border:1px solid rgba(184,135,58,.3);padding:3px 10px;border-radius:20px;letter-spacing:.06em;text-transform:uppercase;}
  .topbar-right{display:flex;align-items:center;gap:10px;}
  .topbar-email{font-size:11px;color:rgba(250,247,242,.5);}
  .btn-sm{background:rgba(184,135,58,.15);color:var(--gold);border:1px solid rgba(184,135,58,.3);border-radius:var(--radius);padding:6px 12px;font-size:11px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;}
  .btn-sm:hover{background:rgba(184,135,58,.3);}
  .btn-sm:disabled{opacity:.5;cursor:not-allowed;}
  .btn-reminder{background:rgba(39,174,96,.15);color:var(--green);border:1px solid rgba(39,174,96,.3);}
  .btn-reminder:hover{background:rgba(39,174,96,.3);}
  .dash-shell{max-width:1100px;margin:0 auto;padding:28px 20px 60px;}
  /* KPIs */
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:28px;}
  .kpi{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;position:relative;overflow:hidden;}
  .kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
  .kpi.total::before{background:var(--gold);}
  .kpi.paid::before{background:var(--green);}
  .kpi.unpaid::before{background:var(--orange);}
  .kpi.guests::before{background:var(--navy);}
  .kpi-label{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
  .kpi-value{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;line-height:1;}
  .kpi.total .kpi-value{color:var(--gold);}
  .kpi.paid .kpi-value{color:var(--green);}
  .kpi.unpaid .kpi-value{color:var(--orange);}
  .kpi.guests .kpi-value{color:var(--navy);}
  .kpi-sub{font-size:11px;color:var(--muted);margin-top:6px;}
  /* Section headings */
  .section-heading{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
  .section-heading h2{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;}
  .section-heading .count{font-size:12px;color:var(--muted);background:var(--warm);border:1px solid var(--border);padding:3px 10px;border-radius:20px;}
  /* Guest cards */
  #guest-list{display:flex;flex-direction:column;gap:14px;margin-bottom:36px;}
  .guest-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:box-shadow .15s;}
  .guest-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);}
  .guest-card-head{display:flex;align-items:center;gap:14px;padding:14px 18px;cursor:pointer;user-select:none;}
  .guest-avatar{width:40px;height:40px;border-radius:50%;background:var(--navy);color:var(--gold);font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .guest-meta{flex:1;min-width:0;}
  .guest-name{font-size:14px;font-weight:600;margin-bottom:4px;}
  /* Clickable contact links */
  .guest-contacts{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px;}
  .contact-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:20px;text-decoration:none;transition:all .15s;white-space:nowrap;}
  .contact-link.email{background:#e8f4fd;color:#1565c0;border:1px solid rgba(21,101,192,.2);}
  .contact-link.email:hover{background:#bbdefb;}
  .contact-link.phone{background:#e8f5e9;color:#2e7d32;border:1px solid rgba(46,125,50,.2);}
  .contact-link.phone:hover{background:#c8e6c9;}
  .guest-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .guest-total{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--ink);}
  .pay-toggle{border:none;border-radius:20px;padding:5px 14px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;}
  .pay-toggle.unpaid{background:var(--orange-lt);color:var(--orange);border:1px solid rgba(230,126,34,.3);}
  .pay-toggle.unpaid:hover{background:#fde3c4;}
  .pay-toggle.paid{background:var(--green-lt);color:var(--green);border:1px solid rgba(39,174,96,.3);}
  .pay-toggle.paid:hover{background:#c8f0d8;}
  .pay-toggle:disabled{opacity:.6;cursor:not-allowed;}
  .guest-chevron{font-size:10px;color:var(--muted);transition:transform .2s;flex-shrink:0;}
  .guest-card.open .guest-chevron{transform:rotate(90deg);}
  .guest-items{display:none;border-top:1px solid var(--border);background:var(--cream);}
  .guest-card.open .guest-items{display:block;}
  .guest-items-inner{padding:14px 18px;}
  .item-row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:6px 0;border-bottom:1px solid rgba(226,217,204,.4);font-size:13px;}
  .item-row:last-child{border-bottom:none;}
  .item-name{color:var(--ink);}
  .item-qty{font-size:11px;color:var(--muted);margin-left:4px;}
  .item-price{font-weight:500;color:var(--ink);white-space:nowrap;}
  .item-total-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0 0;margin-top:4px;border-top:2px solid var(--border);font-weight:600;font-size:14px;}
  .item-total-row span:last-child{color:var(--gold);}
  /* MYP details box */
  .myp-detail-box{margin-top:10px;padding:12px 14px;background:#fff8ec;border:1px solid #ffe0a0;border-radius:var(--radius);border-left:3px solid var(--gold);}
  .myp-detail-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
  .myp-detail-row{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--ink);margin-bottom:4px;}
  .myp-detail-row:last-child{margin-bottom:0;}
  .myp-detail-label{font-weight:600;min-width:60px;color:var(--muted);}
  /* Items table */
  .items-table{background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  .items-table-head{display:grid;grid-template-columns:1fr auto auto;background:var(--navy);padding:10px 18px;}
  .items-table-head span{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(250,247,242,.6);}
  .items-table-head span:last-child{text-align:right;}
  .items-table-row{display:grid;grid-template-columns:1fr auto auto;padding:10px 18px;border-bottom:1px solid var(--border);align-items:center;transition:background .1s;}
  .items-table-row:last-child{border-bottom:none;}
  .items-table-row:hover{background:var(--warm);}
  .item-t-name{font-size:13px;}
  .item-t-qty{font-size:13px;font-weight:600;color:var(--navy);text-align:center;min-width:50px;}
  .item-t-sub{font-size:13px;font-weight:500;color:var(--gold);text-align:right;min-width:90px;}
  .items-table-footer{display:grid;grid-template-columns:1fr auto auto;padding:12px 18px;background:var(--warm);border-top:2px solid var(--border);}
  .items-table-footer .ft{font-size:13px;font-weight:700;}
  .items-table-footer .ft:last-child{color:var(--gold);text-align:right;}
  /* MYP kitchen section in items summary */
  .myp-kitchen-box{background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-top:16px;}
  .myp-kitchen-head{background:var(--gold);padding:10px 18px;display:flex;align-items:center;gap:8px;}
  .myp-kitchen-head span{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);}
  .myp-kitchen-row{padding:10px 18px;border-bottom:1px solid var(--border);font-size:12px;}
  .myp-kitchen-row:last-child{border-bottom:none;}
  .myp-kitchen-guest{font-weight:600;color:var(--ink);margin-bottom:3px;}
  .myp-kitchen-detail{color:var(--muted);}
  /* Loading / empty */
  .loading-state{display:flex;flex-direction:column;align-items:center;gap:14px;padding:60px 20px;color:var(--muted);font-size:13px;}
  .empty-state{text-align:center;padding:48px 20px;color:var(--muted);}
  .empty-icon{font-size:40px;margin-bottom:12px;}
  .empty-text{font-size:14px;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 20px;border-radius:var(--radius);font-size:12px;font-weight:500;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;}
  @media(max-width:600px){.kpi-grid{grid-template-columns:1fr 1fr;}.guest-card-head{flex-wrap:wrap;}.topbar{padding:0 14px;}.dash-shell{padding:20px 12px 60px;}.guest-right{flex-wrap:wrap;gap:6px;}}

  /* ── Kitchen sheet modal ─────────────────────────────────── */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.show{display:flex;}
  .modal-box{background:#fff;border-radius:10px;width:100%;max-width:700px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3);}
  .modal-head{background:var(--navy);padding:18px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .modal-head h3{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--cream);}
  .modal-head-btns{display:flex;gap:8px;}
  .modal-close{background:rgba(255,255,255,.1);color:var(--cream);border:none;border-radius:4px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .modal-close:hover{background:rgba(255,255,255,.2);}
  .modal-body{overflow-y:auto;padding:24px;flex:1;}
  .modal-actions{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0;flex-wrap:wrap;}
  .btn-action{border:none;border-radius:var(--radius);padding:10px 20px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;}
  .btn-action.print{background:var(--navy);color:var(--cream);}
  .btn-action.print:hover{background:#2d2d4e;}
  .btn-action.email{background:var(--gold);color:var(--ink);}
  .btn-action.email:hover{background:#d4a044;}
  .btn-action:disabled{opacity:.6;cursor:not-allowed;}

  /* ── Kitchen sheet print styles ──────────────────────────── */
  .ks-header{text-align:center;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid var(--navy);}
  .ks-header h2{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--navy);margin-bottom:4px;}
  .ks-header p{font-size:12px;color:var(--muted);}
  .ks-meta{display:flex;gap:20px;margin-bottom:20px;flex-wrap:wrap;}
  .ks-meta-item{font-size:12px;color:var(--muted);}
  .ks-meta-item strong{color:var(--ink);}
  .ks-section{margin-bottom:24px;}
  .ks-section-title{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
  .ks-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:8px;}
  .ks-table th{text-align:left;padding:8px 12px;background:var(--navy);color:var(--cream);font-size:11px;font-weight:600;letter-spacing:.06em;}
  .ks-table th:last-child{text-align:right;}
  .ks-table td{padding:8px 12px;border-bottom:1px solid var(--border);}
  .ks-table tr:last-child td{border-bottom:none;}
  .ks-table tr:nth-child(even) td{background:#faf7f2;}
  .ks-table td:last-child{text-align:right;font-weight:600;}
  .ks-myp-card{background:#fff8ec;border:1px solid #ffe0a0;border-radius:6px;padding:12px 14px;margin-bottom:8px;}
  .ks-myp-card-name{font-weight:700;font-size:13px;margin-bottom:4px;color:var(--navy);}
  .ks-myp-card-detail{font-size:12px;color:var(--muted);line-height:1.6;}
  .ks-total-bar{background:var(--navy);color:var(--cream);padding:12px 16px;border-radius:6px;display:flex;justify-content:space-between;align-items:center;font-weight:700;}
  .ks-total-bar span:last-child{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold);}
  .ks-guest-section{margin-bottom:16px;border:1px solid var(--border);border-radius:6px;overflow:hidden;}
  .ks-guest-head{background:var(--warm);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;}
  .ks-guest-name{font-weight:700;font-size:13px;}
  .ks-guest-status{font-size:11px;font-weight:600;padding:2px 10px;border-radius:20px;}
  .ks-guest-status.paid{background:#d4edda;color:#155724;}
  .ks-guest-status.unpaid{background:#fff3cd;color:#856404;}
  .ks-guest-items{padding:8px 14px;}
  .ks-guest-item{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid rgba(226,217,204,.4);}
  .ks-guest-item:last-child{border-bottom:none;}

  /* ── Print media ─────────────────────────────────────────── */
  @media print {
    body > *:not(#print-kitchen-sheet){display:none!important;}
    #print-kitchen-sheet{display:block!important;position:fixed;inset:0;background:#fff;padding:24px;font-family:Arial,sans-serif;z-index:9999;}
    .no-print{display:none!important;}
  }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">🔐</div>
    <div class="auth-title">Organizer Access</div>
    <div class="auth-sub">Farewell Luncheon Dashboard<br>Verifying your access link…</div>
    <div class="auth-error" id="auth-error"></div>
    <div class="auth-spinner" id="auth-spinner">
      <div class="spinner"></div>
      <span>Checking token…</span>
    </div>
  </div>
</div>

<div id="dashboard">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-title">🎉 Luncheon Dashboard</div>
      <div class="topbar-badge">Organizer</div>
    </div>
    <div class="topbar-right">
      <div class="topbar-email" id="organizer-email"></div>
      <button class="btn-sm btn-reminder" id="btn-reminder" onclick="sendReminderAll()">📩 Send Reminders</button>
      <button class="btn-sm" id="btn-kitchen" onclick="openKitchenSheet()" style="background:rgba(184,135,58,.25);color:var(--gold);border-color:rgba(184,135,58,.5);">🍽️ Kitchen Sheet</button>
      <button class="btn-sm" id="btn-refresh" onclick="loadOrders()">↻ Refresh</button>
    </div>
  </div>

  <div class="dash-shell">
    <div class="kpi-grid">
      <div class="kpi guests"><div class="kpi-label">Total Guests</div><div class="kpi-value" id="kpi-guests">—</div><div class="kpi-sub">submitted orders</div></div>
      <div class="kpi paid"><div class="kpi-label">Paid</div><div class="kpi-value" id="kpi-paid">—</div><div class="kpi-sub" id="kpi-paid-amt">—</div></div>
      <div class="kpi unpaid"><div class="kpi-label">Unpaid</div><div class="kpi-value" id="kpi-unpaid">—</div><div class="kpi-sub" id="kpi-unpaid-amt">—</div></div>
      <div class="kpi total"><div class="kpi-label">Total Due</div><div class="kpi-value" id="kpi-total">—</div><div class="kpi-sub">all orders combined</div></div>
    </div>

    <div class="section-heading">
      <h2>Guest Orders</h2>
      <span class="count" id="guest-count">Loading…</span>
    </div>
    <div id="guest-list">
      <div class="loading-state"><div class="spinner lg"></div><span>Loading orders…</span></div>
    </div>

    <div class="section-heading" style="margin-top:12px">
      <h2>Items Ordered</h2>
      <span class="count" id="items-count">—</span>
    </div>
    <div id="items-summary">
      <div class="loading-state"><div class="spinner lg"></div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Kitchen sheet modal -->
<div class="modal-overlay" id="kitchen-modal" onclick="if(event.target===this)closeKitchenModal()">
  <div class="modal-box">
    <div class="modal-head">
      <h3>🍽️ Kitchen Order Sheet</h3>
      <div class="modal-head-btns">
        <button class="modal-close" onclick="closeKitchenModal()">✕ Close</button>
      </div>
    </div>
    <div class="modal-body" id="kitchen-sheet-content"></div>
    <div class="modal-actions">
      <button class="btn-action print" onclick="printKitchenSheet()">🖨️ Download / Print PDF</button>
      <button class="btn-action email" id="btn-email-sheet" onclick="emailKitchenSheet()">📧 Email to Organizer</button>
    </div>
  </div>
</div>

<!-- Hidden print target -->
<div id="print-kitchen-sheet" style="display:none"></div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyVAXSiFTvDt4u4Rl78zD9UBoODSPmt0xjn2lvrj-kfskKmBXgZqoIGAxO9GmB8taWq/exec';

const params = new URLSearchParams(window.location.search);
const TOKEN  = params.get('token') || '';
let allOrders = [];

// ── Auth ──────────────────────────────────────────────────────
async function checkAuth() {
  if (!TOKEN) return showAuthError('No access token found. Please use the link sent to you by the organizer.');
  try {
    const res  = await fetch(APPS_SCRIPT_URL,{method:'POST',redirect:'follow',body:JSON.stringify({action:'verify_token',token:TOKEN})});
    const text = await res.text();
    let data; try{ data=JSON.parse(text); }catch(e){ return showAuthError('Could not connect. Please check your internet and try again.'); }
    if (!data.valid) return showAuthError('This access link is invalid or has been revoked.');
    document.getElementById('organizer-email').textContent = data.email || '';
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('dashboard').style.display   = 'block';
    loadOrders();
  } catch(e) {
    showAuthError('Could not connect. Please check your internet and try again.');
  }
}
function showAuthError(msg) {
  document.getElementById('auth-spinner').style.display = 'none';
  const el = document.getElementById('auth-error');
  el.textContent = msg; el.classList.add('show');
}

// ── Load orders ───────────────────────────────────────────────
async function loadOrders() {
  const btn = document.getElementById('btn-refresh');
  btn.disabled = true; btn.textContent = '↻ Loading…';
  try {
    const res  = await fetch(APPS_SCRIPT_URL,{method:'POST',redirect:'follow',body:JSON.stringify({action:'get_orders',token:TOKEN})});
    const text2 = await res.text();
    let data; try{ data=JSON.parse(text2); }catch(e){ showToast('Failed to load. Try refreshing.'); return; }
    if (data.error) { showToast('Error: '+data.error); return; }
    allOrders = data.orders || [];
    // Mark test orders so the UI can style them
    // isTest flag comes directly from the backend (column 9 = 'YES')
    renderDashboard();
  } catch(e) { showToast('Failed to load. Try refreshing.'); }
  finally { btn.disabled=false; btn.textContent='↻ Refresh'; }
}

// ── Render ────────────────────────────────────────────────────
function renderDashboard() {
  const orders       = allOrders;
  const paidOrders   = orders.filter(o=>o.status==='Paid');
  const unpaidOrders = orders.filter(o=>o.status!=='Paid');
  const totalAmt     = orders.reduce((s,o)=>s+o.total,0);
  const paidAmt      = paidOrders.reduce((s,o)=>s+o.total,0);
  const unpaidAmt    = unpaidOrders.reduce((s,o)=>s+o.total,0);

  document.getElementById('kpi-guests').textContent     = orders.length;
  document.getElementById('kpi-paid').textContent       = paidOrders.length;
  document.getElementById('kpi-unpaid').textContent     = unpaidOrders.length;
  document.getElementById('kpi-total').textContent      = krw(totalAmt);
  document.getElementById('kpi-paid-amt').textContent   = krw(paidAmt)+' collected';
  document.getElementById('kpi-unpaid-amt').textContent = krw(unpaidAmt)+' outstanding';
  document.getElementById('guest-count').textContent    = orders.length+' guest'+(orders.length!==1?'s':'');

  const gl = document.getElementById('guest-list');
  gl.innerHTML = orders.length===0
    ? '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">No orders yet.</div></div>'
    : orders.map(renderGuestCard).join('');

  renderItemsSummary(orders);
}

// ── Guest card ────────────────────────────────────────────────
function renderGuestCard(o) {
  const isPaid   = o.status==='Paid';
  const initials = o.name.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();
  const items    = Array.isArray(o.items)?o.items:[];

  const itemRows = items.map(it=>
    '<div class="item-row">'+
      '<span class="item-name">'+it.name+'<span class="item-qty">'+(it.qty>1?' \xd7'+it.qty:'')+'</span></span>'+
      '<span class="item-price">'+krw(it.subtotal||it.price*it.qty)+'</span>'+
    '</div>'
  ).join('');

  // Parse MYP details into structured display
  let mypBox = '';
  if (o.myp && o.myp.trim()) {
    // myp format: "Toasts: X, Y | Salad: Z"
    const toastMatch = o.myp.match(/Toasts?:\s*([^|]+)/i);
    const saladMatch = o.myp.match(/Salad:\s*(.+)/i);
    const toasts = toastMatch ? toastMatch[1].trim() : o.myp;
    const salad  = saladMatch ? saladMatch[1].trim() : '';
    mypBox = '<div class="myp-detail-box">'+
      '<div class="myp-detail-title">🍽️ Make Your Plate — Kitchen Details</div>'+
      '<div class="myp-detail-row"><span class="myp-detail-label">Toasts</span><span>'+toasts+'</span></div>'+
      (salad?'<div class="myp-detail-row"><span class="myp-detail-label">Salad</span><span>'+salad+'</span></div>':'')+
    '</div>';
  }

  return '<div class="guest-card" id="gc-'+o.rowIndex+'"'+(o.isTest?' style="border-color:#ffe082;background:#fffdf0;"':'')+'>'+
    '<div class="guest-card-head" onclick="toggleCard('+o.rowIndex+')">'+(o.isTest?'<div style="background:#856404;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;letter-spacing:.06em;flex-shrink:0">🧪 TEST</div>':'')+
      '<div class="guest-avatar">'+initials+'</div>'+
      '<div class="guest-meta">'+
        '<div class="guest-name">'+o.name+'</div>'+
        '<div class="guest-contacts">'+
          '<a class="contact-link email" href="mailto:'+o.email+'" onclick="event.stopPropagation()" title="Send email">✉️ '+o.email+'</a>'+
          '<a class="contact-link phone" href="tel:'+o.phone.replace(/[^0-9+]/g,'')+'" onclick="event.stopPropagation()" title="Call">📞 '+o.phone+'</a>'+
        '</div>'+
      '</div>'+
      '<div class="guest-right">'+
        '<div class="guest-total">'+krw(o.total)+'</div>'+
        '<button class="pay-toggle '+(isPaid?'paid':'unpaid')+'" id="ptbtn-'+o.rowIndex+'" onclick="event.stopPropagation();togglePaid('+o.rowIndex+')">'+(isPaid?'✓ Paid':'Unpaid')+'</button>'+
        (o.isTest?'<button class="pay-toggle" style="background:#fde8e6;color:#c0392b;border:1px solid rgba(192,57,43,.3)" id="delbtn-'+o.rowIndex+'" onclick="event.stopPropagation();deleteTestOrder('+o.rowIndex+')">🗑️ Delete</button>':'')+
        '<span class="guest-chevron">▶</span>'+
      '</div>'+
    '</div>'+
    '<div class="guest-items">'+
      '<div class="guest-items-inner">'+
        itemRows+
        mypBox+
        '<div class="item-total-row"><span>Total</span><span>'+krw(o.total)+'</span></div>'+
      '</div>'+
    '</div>'+
  '</div>';
}

function toggleCard(rowIndex) {
  document.getElementById('gc-'+rowIndex).classList.toggle('open');
}

// ── Toggle paid ───────────────────────────────────────────────
async function togglePaid(rowIndex) {
  const btn = document.getElementById('ptbtn-'+rowIndex);
  btn.disabled=true; const old=btn.textContent; btn.textContent='…';
  try {
    const res  = await fetch(APPS_SCRIPT_URL,{method:'POST',redirect:'follow',body:JSON.stringify({action:'toggle_paid',token:TOKEN,rowIndex})});
    const _rt1=await res.text(); const data=JSON.parse(_rt1);
    if (data.error) throw new Error(data.error);
    const order = allOrders.find(o=>o.rowIndex===rowIndex);
    if (order) order.status=data.newStatus;
    const isPaid=data.newStatus==='Paid';
    btn.textContent=isPaid?'✓ Paid':'Unpaid';
    btn.className='pay-toggle '+(isPaid?'paid':'unpaid');
    btn.disabled=false;
    rerenderKpis();
    showToast((order?.name||'Guest')+' marked as '+data.newStatus);
  } catch(e) { btn.textContent=old; btn.disabled=false; showToast('Failed. Try again.'); }
}

function rerenderKpis() {
  const paidOrders   = allOrders.filter(o=>o.status==='Paid');
  const unpaidOrders = allOrders.filter(o=>o.status!=='Paid');
  const totalAmt     = allOrders.reduce((s,o)=>s+o.total,0);
  const paidAmt      = paidOrders.reduce((s,o)=>s+o.total,0);
  const unpaidAmt    = unpaidOrders.reduce((s,o)=>s+o.total,0);
  document.getElementById('kpi-paid').textContent       = paidOrders.length;
  document.getElementById('kpi-unpaid').textContent     = unpaidOrders.length;
  document.getElementById('kpi-total').textContent      = krw(totalAmt);
  document.getElementById('kpi-paid-amt').textContent   = krw(paidAmt)+' collected';
  document.getElementById('kpi-unpaid-amt').textContent = krw(unpaidAmt)+' outstanding';
}

// ── Send reminders to all unpaid guests ──────────────────────
async function sendReminderAll() {
  const unpaid = allOrders.filter(o=>o.status!=='Paid');
  if (unpaid.length===0) { showToast('All guests are already paid! 🎉'); return; }
  if (!confirm('Send reminder emails to '+unpaid.length+' unpaid guest(s)?')) return;
  const btn=document.getElementById('btn-reminder');
  btn.disabled=true; btn.textContent='📩 Sending…';
  try {
    const res  = await fetch(APPS_SCRIPT_URL,{method:'POST',redirect:'follow',body:JSON.stringify({action:'send_reminders',token:TOKEN,orders:unpaid})});
    const _rt2=await res.text(); const data=JSON.parse(_rt2);
    if (data.error) throw new Error(data.error);
    showToast('Reminders sent to '+unpaid.length+' guest(s) ✓');
  } catch(e) { showToast('Failed to send reminders.'); }
  finally { btn.disabled=false; btn.textContent='📩 Send Reminders'; }
}

// ── Items summary ─────────────────────────────────────────────
function renderItemsSummary(orders) {
  const counts={};
  const mypOrders=[];

  orders.forEach(o=>{
    (o.items||[]).forEach(it=>{
      // Group MYP into its own section, not regular table
      if(it.name&&it.name.startsWith('Make Your Plate')) return;
      const k=it.name;
      if(!counts[k])counts[k]={qty:0,subtotal:0};
      counts[k].qty+=it.qty;
      counts[k].subtotal+=it.subtotal||it.price*it.qty;
    });
    // Collect MYP orders for kitchen section
    if(o.myp&&o.myp.trim()){
      const mypItem=(o.items||[]).find(it=>it.name&&it.name.startsWith('Make Your Plate'));
      mypOrders.push({guest:o.name,myp:o.myp,qty:mypItem?mypItem.qty:1,subtotal:mypItem?mypItem.subtotal:0});
    }
  });

  const entries  = Object.entries(counts).filter(([,v])=>v.qty>0).sort((a,b)=>b[1].qty-a[1].qty);
  const totalQty = entries.reduce((s,[,v])=>s+v.qty,0)+(mypOrders.reduce((s,m)=>s+m.qty,0));
  const totalSub = entries.reduce((s,[,v])=>s+v.subtotal,0)+(mypOrders.reduce((s,m)=>s+m.subtotal,0));

  document.getElementById('items-count').textContent=totalQty+' total items';

  if(entries.length===0&&mypOrders.length===0){
    document.getElementById('items-summary').innerHTML='<div class="empty-state"><div class="empty-icon">🍽️</div><div class="empty-text">No items yet.</div></div>';
    return;
  }

  const rows=entries.map(([name,v])=>
    '<div class="items-table-row">'+
      '<span class="item-t-name">'+name+'</span>'+
      '<span class="item-t-qty">'+v.qty+'</span>'+
      '<span class="item-t-sub">'+krw(v.subtotal)+'</span>'+
    '</div>'
  ).join('');

  // MYP kitchen section
  let mypSection='';
  if(mypOrders.length>0){
    const mypRows=mypOrders.map(m=>{
      const toastMatch=m.myp.match(/Toasts?:\s*([^|]+)/i);
      const saladMatch=m.myp.match(/Salad:\s*(.+)/i);
      const toasts=toastMatch?toastMatch[1].trim():m.myp;
      const salad=saladMatch?saladMatch[1].trim():'';
      return '<div class="myp-kitchen-row">'+
        '<div class="myp-kitchen-guest">'+m.guest+(m.qty>1?' (×'+m.qty+')':'')+'</div>'+
        '<div class="myp-kitchen-detail">🍞 '+toasts+(salad?' &nbsp;·&nbsp; 🥗 '+salad:'')+'</div>'+
      '</div>';
    }).join('');
    mypSection='<div class="myp-kitchen-box">'+
      '<div class="myp-kitchen-head"><span>🍽️ Make Your Plate — Kitchen Order Sheet</span></div>'+
      mypRows+
    '</div>';
  }

  document.getElementById('items-summary').innerHTML=
    '<div class="items-table">'+
      '<div class="items-table-head"><span>Item</span><span style="text-align:center;min-width:50px">Qty</span><span style="text-align:right;min-width:90px">Subtotal</span></div>'+
      rows+
      '<div class="items-table-footer">'+
        '<span class="ft">Total</span>'+
        '<span class="ft" style="text-align:center;min-width:50px">'+totalQty+'</span>'+
        '<span class="ft" style="text-align:right;min-width:90px;color:var(--gold)">'+krw(totalSub)+'</span>'+
      '</div>'+
    '</div>'+
    mypSection;
}

function krw(n){return '₩'+(Number(n)||0).toLocaleString('ko-KR');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3500);}

// ── Kitchen sheet ─────────────────────────────────────────────
function buildKitchenSheetHTML(orders) {
  const now=new Date().toLocaleString('en-US',{dateStyle:'medium',timeStyle:'short'});
  const totalDue=orders.reduce((s,o)=>s+o.total,0);
  const paidAmt=orders.filter(o=>o.status==='Paid').reduce((s,o)=>s+o.total,0);
  const unpaidAmt=orders.filter(o=>o.status!=='Paid').reduce((s,o)=>s+o.total,0);

  const counts={};const mypOrders=[];
  orders.forEach(o=>{
    (o.items||[]).forEach(it=>{
      if(it.name&&it.name.startsWith('Make Your Plate'))return;
      if(!counts[it.name])counts[it.name]={qty:0,subtotal:0};
      counts[it.name].qty+=it.qty;
      counts[it.name].subtotal+=it.subtotal||it.price*it.qty;
    });
    if(o.myp&&o.myp.trim()){
      const mypItem=(o.items||[]).find(it=>it.name&&it.name.startsWith('Make Your Plate'));
      mypOrders.push({guest:o.name,myp:o.myp,qty:mypItem?mypItem.qty:1});
    }
  });
  const entries=Object.entries(counts).filter(([,v])=>v.qty>0).sort((a,b)=>b[1].qty-a[1].qty);

  const itemRowsHtml=entries.map(([name,v])=>'<tr><td>'+name+'</td><td style="text-align:center;font-weight:700">'+v.qty+'</td><td>'+krw(v.subtotal)+'</td></tr>').join('');

  const mypCardsHtml=mypOrders.map(m=>{
    const tm=m.myp.match(/Toasts?:\s*([^|]+)/i);
    const sm=m.myp.match(/Salad:\s*(.+)/i);
    const toasts=tm?tm[1].trim():m.myp;
    const salad=sm?sm[1].trim():'';
    return '<div class="ks-myp-card"><div class="ks-myp-card-name">'+m.guest+(m.qty>1?' (×'+m.qty+')':'')+'</div><div class="ks-myp-card-detail">🍞 Toasts: <strong>'+toasts+'</strong>'+(salad?'<br>🥗 Salad: <strong>'+salad+'</strong>':'')+'</div></div>';
  }).join('');

  const guestInvoicesHtml=orders.map(o=>{
    const items=Array.isArray(o.items)?o.items:[];
    const isPaid=o.status==='Paid';
    const itemLines=items.map(it=>'<div class="ks-guest-item"><span>'+it.name+(it.qty>1?' ×'+it.qty:'')+'</span><span>'+krw(it.subtotal||it.price*it.qty)+'</span></div>').join('');
    const mypNote=o.myp?'<div style="font-size:11px;color:#7a6f63;padding:4px 0;border-top:1px solid #f0e8dc;margin-top:4px">🍽️ '+o.myp+'</div>':'';
    return '<div class="ks-guest-section">'+
      '<div class="ks-guest-head">'+
        '<div><div class="ks-guest-name">'+o.name+'</div><div style="font-size:11px;color:#7a6f63;margin-top:2px">'+o.email+' · '+o.phone+'</div></div>'+
        '<div style="display:flex;align-items:center;gap:10px"><span class="ks-guest-status '+(isPaid?'paid':'unpaid')+'">'+(isPaid?'✓ Paid':'⏳ Unpaid')+'</span><strong style="font-family:serif;font-size:16px">'+krw(o.total)+'</strong></div>'+
      '</div>'+
      '<div class="ks-guest-items">'+itemLines+mypNote+'</div>'+
    '</div>';
  }).join('');

  return '<div class="ks-header"><h2>🍽️ Kitchen Order Sheet</h2><p>Farewell Luncheon for Dominique &nbsp;·&nbsp; Tuesday, 31 March &nbsp;·&nbsp; 11:00 AM &nbsp;·&nbsp; Bakery Café 292LU</p><p style="margin-top:4px;font-size:11px;color:#a09589">Generated: '+now+'</p></div>'+
    '<div class="ks-meta"><div class="ks-meta-item">👥 Guests: <strong>'+orders.length+'</strong></div><div class="ks-meta-item">✅ Paid: <strong>'+orders.filter(o=>o.status==='Paid').length+'</strong></div><div class="ks-meta-item">⏳ Unpaid: <strong>'+orders.filter(o=>o.status!=='Paid').length+'</strong></div><div class="ks-meta-item">💵 Total Due: <strong>'+krw(totalDue)+'</strong></div><div class="ks-meta-item">✅ Collected: <strong>'+krw(paidAmt)+'</strong></div><div class="ks-meta-item">⏳ Outstanding: <strong>'+krw(unpaidAmt)+'</strong></div></div>'+
    (entries.length>0?'<div class="ks-section"><div class="ks-section-title">All Items — Aggregated Prep List</div><table class="ks-table"><tr><th>Item</th><th style="text-align:center;min-width:60px">Qty</th><th style="text-align:right;min-width:100px">Subtotal</th></tr>'+itemRowsHtml+'</table></div>':'')+
    (mypOrders.length>0?'<div class="ks-section"><div class="ks-section-title">Make Your Plate — Individual Details</div>'+mypCardsHtml+'</div>':'')+
    '<div class="ks-section"><div class="ks-section-title">Per-Guest Invoices</div>'+guestInvoicesHtml+'</div>'+
    '<div class="ks-total-bar"><span>Grand Total Due</span><span>'+krw(totalDue)+'</span></div>';
}

function openKitchenSheet(){
  if(allOrders.length===0){showToast('No orders yet.');return;}
  document.getElementById('kitchen-sheet-content').innerHTML=buildKitchenSheetHTML(allOrders);
  document.getElementById('kitchen-modal').classList.add('show');
}

async function emailKitchenSheet(){
  const btn=document.getElementById('btn-email-sheet');
  btn.disabled=true; btn.textContent='📧 Sending…';
  const htmlContent=buildKitchenSheetHTML(allOrders);
  try{
    const res=await fetch(APPS_SCRIPT_URL,{method:'POST',redirect:'follow',body:JSON.stringify({action:'email_kitchen_sheet',token:TOKEN,htmlContent})});
    const _rt3=await res.text(); const data=JSON.parse(_rt3);
    if(data.error)throw new Error(data.error);
    showToast('Kitchen sheet emailed to organizers ✓');
  }catch(e){showToast('Failed to send email.');}
  finally{btn.disabled=false;btn.textContent='📧 Email to Organizer';}
}

// ── Delete test order ─────────────────────────────────────────
async function deleteTestOrder(rowIndex) {
  if (!confirm('Delete this test order from the sheet?')) return;
  const btn = document.getElementById('delbtn-'+rowIndex);
  if (btn) { btn.disabled=true; btn.textContent='…'; }
  try {
    const res  = await fetch(APPS_SCRIPT_URL,{method:'POST',redirect:'follow',body:JSON.stringify({action:'delete_order',token:TOKEN,rowIndex})});
    const _rt4=await res.text(); const data=JSON.parse(_rt4);
    if (data.error) throw new Error(data.error);
    // Remove card from UI and from allOrders
    const card = document.getElementById('gc-'+rowIndex);
    if (card) card.remove();
    allOrders = allOrders.filter(o=>o.rowIndex!==rowIndex);
    rerenderKpis();
    showToast('Test order deleted ✓');
  } catch(e) {
    if (btn) { btn.disabled=false; btn.textContent='🗑️ Delete'; }
    showToast('Failed to delete: '+(e.message||'try again'));
  }
}
