<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
</head>

<body>

<h2>Organizer Dashboard</h2>
<button onclick="load()">Refresh</button>
<button onclick="sendReminders()">Send Reminders</button>

<div id="list"></div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzjPi9xauz1rriC7tfqipKdvKR22G4AUCDxL4x_6DNxYsZzZqClpAlV0TPO_qbCtGHbGQ/exec";

function load(){
  fetch(URL,{
    method:"POST",
    body:JSON.stringify({action:'get_orders'})
  })
  .then(r=>r.json())
  .then(data=>{
    let html="";
    data.forEach((o,i)=>{
      html += "<div>";
      html += "<b>"+o.Name+"</b><br>";
      html += o.Email+"<br>";
      html += "₩"+o.Total+"<br>";
      html += "<button onclick='toggle("+(i+2)+")'>Toggle Paid</button>";
      html += "</div><hr>";
    });
    document.getElementById("list").innerHTML=html;
  });
}

function toggle(row){
  fetch(URL,{
    method:"POST",
    body:JSON.stringify({
      action:'toggle_paid',
      row:row,
      value:'Paid'
    })
  }).then(load);
}

function sendReminders(){
  fetch(URL,{
    method:"POST",
    body:JSON.stringify({action:'send_reminders'})
  });
}

load();
</script>

</body>
</html>
