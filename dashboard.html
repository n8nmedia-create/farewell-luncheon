<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizer Dashboard — Farewell Luncheon</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1c1917;
            --cream: #faf7f2;
            --warm: #f5f0e8;
            --border: #e2d9cc;
            --gold: #b8873a;
            --white: #ffffff;
            --green: #27ae60;
            --red: #c0392b;
            --radius: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--warm); color: var(--ink); line-height: 1.5; }

        /* AUTH SCREEN */
        #auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        
        /* DASHBOARD LAYOUT */
        #dashboard { display: none; }
        .nav-bar { background: var(--ink); color: var(--white); padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 24px; }
        
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }

        /* STATS */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--white); padding: 20px; border-radius: var(--radius); border: 1px solid var(--border); }
        .stat-val { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 600; color: var(--gold); }
        .stat-lbl { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }

        /* ORDERS LIST */
        .order-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; position: relative; }
        .order-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; border-bottom: 1px solid var(--warm); padding-bottom: 12px; }
        .guest-info h3 { font-size: 18px; font-weight: 700; }
        .guest-info p { font-size: 13px; color: #666; }

        .item-list { list-style: none; margin: 10px 0; }
        .item-row { display: flex; justify-content: space-between; font-size: 14px; padding: 4px 0; border-bottom: 1px dashed var(--warm); }
        .myp-details { font-size: 12px; font-style: italic; color: var(--gold); background: var(--cream); padding: 4px 8px; border-radius: 4px; margin-top: 4px; }

        /* BUTTONS */
        .btn-paid { background: #eafaf1; color: var(--green); border: 1px solid #d4edda; padding: 6px 16px; border-radius: 20px; font-weight: 700; cursor: pointer; font-size: 12px; }
        .btn-unpaid { background: #fdedec; color: var(--red); border: 1px solid #fadbd8; padding: 6px 16px; border-radius: 20px; font-weight: 700; cursor: pointer; font-size: 12px; }
        
        .kitchen-btn { background: var(--gold); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: 600; }

        /* PRINT MODE */
        @media print {
            .nav-bar, .stats-grid, .btn-paid, .btn-unpaid, .kitchen-btn { display: none !important; }
            .order-card { border: 1px solid #ccc; break-inside: avoid; }
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="card">
            <h1 style="font-family: 'Cormorant Garamond';">Authenticating...</h1>
            <p id="auth-msg">Checking your organizer credentials.</p>
        </div>
    </div>

    <div id="dashboard">
        <div class="nav-bar">
            <div class="nav-logo">Dominique's Farewell <em>Admin</em></div>
            <button class="kitchen-btn" onclick="window.print()">Print Kitchen Sheet</button>
        </div>

        <div class="container">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-lbl">Total Guests</div>
                    <div class="stat-val" id="stat-count">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-lbl">Collected (Paid)</div>
                    <div class="stat-val" id="stat-paid">₩0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-lbl">Pending (Unpaid)</div>
                    <div class="stat-val" id="stat-pending" style="color: var(--red)">₩0</div>
                </div>
            </div>

            <h2 style="margin-bottom: 20px; font-family: 'Cormorant Garamond';">Live Orders</h2>
            <div id="orders-container">
                </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbyVAXSiFTvDt4u4Rl78zD9UBoODSPmt0xjn2lvrj-kfskKmBXgZqoIGAxO9GmB8taWq/exec';
        let currentToken = '';

        async function init() {
            const params = new URLSearchParams(window.location.search);
            currentToken = params.get('token');

            if (!currentToken) {
                document.getElementById('auth-msg').textContent = "Access Denied: No token provided.";
                return;
            }

            try {
                const res = await fetch(`${API_URL}?action=verify_token&token=${currentToken}`);
                const data = await res.json();

                if (data.valid) {
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    loadOrders();
                } else {
                    document.getElementById('auth-msg').textContent = "Access Denied: Invalid or expired token.";
                }
            } catch (e) {
                document.getElementById('auth-msg').textContent = "Connection Error. Please try again.";
            }
        }

        async function loadOrders() {
            const res = await fetch(`${API_URL}?action=get_orders&token=${currentToken}`);
            const orders = await res.json();
            renderOrders(orders);
        }

        function renderOrders(orders) {
            const container = document.getElementById('orders-container');
            let totalPaid = 0;
            let totalPending = 0;
            
            container.innerHTML = orders.map(order => {
                const isPaid = order.status === 'Paid';
                if (isPaid) totalPaid += order.total; else totalPending += order.total;

                return `
                    <div class="order-card">
                        <div class="order-header">
                            <div class="guest-info">
                                <h3>${order.name}</h3>
                                <p>${order.email}</p>
                            </div>
                            <button class="${isPaid ? 'btn-paid' : 'btn-unpaid'}" onclick="toggleStatus(${order.rowIndex}, '${order.status}')">
                                ${order.status.toUpperCase()}
                            </button>
                        </div>
                        <div class="item-list">
                            ${order.items.map(i => `
                                <div class="item-row">
                                    <span>${i.name}</span>
                                    <span>₩${i.price.toLocaleString()}</span>
                                </div>
                                ${i.details ? `<div class="myp-details">Selections: ${i.details}</div>` : ''}
                            `).join('')}
                        </div>
                        <div style="text-align: right; font-weight: 700; margin-top: 10px;">
                            Total: ₩${order.total.toLocaleString()}
                        </div>
                    </div>
                `;
            }).join('');

            // Update Stats
            document.getElementById('stat-count').textContent = orders.length;
            document.getElementById('stat-paid').textContent = `₩${totalPaid.toLocaleString()}`;
            document.getElementById('stat-pending').textContent = `₩${totalPending.toLocaleString()}`;
        }

        async function toggleStatus(rowIndex, currentStatus) {
            // Optimistic UI update
            loadOrders(); 

            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    action: 'toggle_paid',
                    rowIndex: rowIndex,
                    status: currentStatus
                })
            });

            // Refresh after a short delay to allow Google Sheets to update
            setTimeout(loadOrders, 1000);
        }

        init();
    </script>
</body>
</html>
