<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Farewell Luncheon</title>
<style>
body {font-family: Arial; padding:20px;}
.card {margin:10px 0;}
button {padding:10px;}
.error {color:red;}
</style>
</head>

<body>

<h2>Farewell Luncheon Order</h2>

<div>
<input id="name" placeholder="Full Name"><br><br>
<input id="email" placeholder="Email"><br><br>
<input id="phone" placeholder="Phone"><br>
</div>

<h3>Items</h3>

<div class="card">
Americano ₩5,000
<input type="number" id="americano" value="0">
</div>

<div class="card">
Latte ₩6,000
<input type="number" id="latte" value="0">
</div>

<h3 id="total">Total: ₩0</h3>

<button onclick="submitOrder()">Submit</button>

<script>
const URL = "PASTE_YOUR_WEBAPP_URL";

function calc(){
  let total =
    document.getElementById("americano").value*5000 +
    document.getElementById("latte").value*6000;

  document.getElementById("total").innerText =
    "Total: ₩" + total.toLocaleString();
}
document.querySelectorAll("input").forEach(i=>i.oninput=calc);

function submitOrder(){
  let data = {
    action:'submit_order',
    name: name.value,
    email: email.value,
    phone: phone.value,
    items:{
      americano: americano.value,
      latte: latte.value
    },
    total: (
      americano.value*5000 +
      latte.value*6000
    )
  };

  fetch(URL,{
    method:"POST",
    body:JSON.stringify(data)
  }).then(r=>r.json())
    .then(()=>alert("Submitted"));
}
</script>

</body>
</html>
