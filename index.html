<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farewell Luncheon — Pre-Order</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1c1917;
            --cream: #faf7f2;
            --warm: #f5f0e8;
            --border: #e2d9cc;
            --gold: #b8873a;
            --gold-lt: #f0e6d0;
            --muted: #7a6f63;
            --white: #ffffff;
            --radius: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); line-height: 1.5; padding-bottom: 100px; }

        /* HEADER */
        .site-header { background: var(--ink); color: var(--cream); text-align: center; padding: 60px 24px; position: relative; }
        .header-eyebrow { font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 8px; opacity: 0.8; }
        .header-title { font-family: 'Cormorant Garamond', serif; font-size: 42px; font-weight: 300; margin-bottom: 12px; }
        .header-title em { font-style: italic; font-weight: 400; color: var(--gold-lt); }
        .header-sub { max-width: 500px; margin: 0 auto; font-size: 15px; opacity: 0.9; }

        /* FORM SHELL */
        .container { max-width: 600px; margin: -30px auto 0; padding: 0 20px; position: relative; z-index: 10; }
        .card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 24px; }
        
        .section-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; margin-bottom: 16px; border-bottom: 1px solid var(--warm); padding-bottom: 8px; }

        /* INPUTS */
        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; margin-bottom: 6px; color: var(--muted); }
        input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius); font-family: inherit; font-size: 16px; outline: none; }
        input:focus { border-color: var(--gold); }

        /* MENU ITEMS */
        .category-block { margin-bottom: 32px; }
        .category-name { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gold); margin-bottom: 16px; }
        .menu-item { display: flex; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid var(--warm); }
        .menu-item:last-child { border-bottom: none; }
        .item-info { flex: 1; padding-right: 16px; }
        .item-name { font-weight: 500; font-size: 17px; margin-bottom: 4px; }
        .item-desc { font-size: 13px; color: var(--muted); line-height: 1.4; }
        .item-price { font-weight: 600; font-size: 15px; margin-top: 4px; }
        
        .add-btn { 
            background: var(--warm); border: 1px solid var(--border); border-radius: 20px; padding: 6px 16px; 
            font-size: 13px; font-weight: 600; cursor: pointer; height: fit-content; transition: 0.2s;
        }
        .add-btn:hover { background: var(--gold); color: white; border-color: var(--gold); }

        /* CART BAR */
        .summary-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; background: var(--ink); color: var(--white); 
            padding: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .total-box .lbl { font-size: 11px; opacity: 0.6; text-transform: uppercase; }
        .total-box .val { font-size: 20px; font-weight: 600; font-family: 'Cormorant Garamond', serif; }
        .submit-btn { background: var(--gold); color: white; border: none; padding: 12px 28px; border-radius: 30px; font-weight: 600; cursor: pointer; }
        .submit-btn:disabled { background: #444; cursor: not-allowed; }

        /* MODAL (For MYP) */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--white); width: 100%; max-width: 450px; border-radius: var(--radius); padding: 24px; max-height: 90vh; overflow-y: auto; }
        .modal-opt-group { margin-bottom: 20px; }
        .modal-opt-group h4 { font-size: 14px; margin-bottom: 10px; border-bottom: 1px solid var(--warm); padding-bottom: 4px; }
        .opt-label { display: flex; align-items: center; gap: 10px; padding: 8px 0; font-size: 14px; cursor: pointer; }

        /* SUCCESS SCREEN */
        #success-screen { display: none; text-align: center; padding: 60px 20px; }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="header-eyebrow">Farewell Luncheon</div>
        <h1 class="header-title">For <em>Dominique</em></h1>
        <p class="header-sub">Tuesday, 31 March • 11:00 AM<br>Bakery Café 292LU</p>
    </header>

    <div id="main-content" class="container">
        <div class="card">
            <h2 class="section-title">Your Information</h2>
            <div class="field">
                <label>Full Name</label>
                <input type="text" id="g-name" placeholder="First and Last Name">
            </div>
            <div class="field">
                <label>Email Address</label>
                <input type="email" id="g-email" placeholder="your@email.com">
            </div>
            <div class="field">
                <label>Phone Number</label>
                <input type="tel" id="g-phone" placeholder="010-0000-0000">
            </div>
        </div>

        <div class="card">
            <h2 class="section-title">Select Your Order</h2>
            <div id="menu-list">
                </div>
        </div>
    </div>

    <div id="success-screen" class="container">
        <div class="card">
            <h2 class="header-title" style="color:var(--ink)">Thank You!</h2>
            <p>Your order has been sent to the organizers.</p>
            <div style="margin: 20px 0; padding: 20px; background: var(--warm); border-radius: var(--radius); text-align: left;" id="order-summary-box"></div>
            <button onclick="location.reload()" class="add-btn" style="background:var(--ink); color:white; width:100%; padding:12px;">Place Another Order</button>
        </div>
    </div>

    <div class="summary-bar" id="cart-bar" style="display: none;">
        <div class="total-box">
            <div class="lbl">Total Due (Pay at Café)</div>
            <div class="val" id="display-total">₩0</div>
        </div>
        <button class="submit-btn" id="btn-submit" onclick="submitOrder()">Submit Order</button>
    </div>

    <div id="myp-modal" class="modal">
        <div class="modal-content">
            <h2 class="section-title">Customize Your Plate</h2>
            <p style="font-size: 13px; margin-bottom: 20px; color: var(--muted);">Choose 2 Toasts and 1 Salad.</p>
            
            <div class="modal-opt-group">
                <h4>Toasts (Pick 2)</h4>
                <label class="opt-label"><input type="checkbox" name="toast" value="Avocado"> Avocado Toast</label>
                <label class="opt-label"><input type="checkbox" name="toast" value="Jamon & Havarti"> Jamon & Havarti Toast</label>
                <label class="opt-label"><input type="checkbox" name="toast" value="Bacon Egg"> Bacon Egg Toast</label>
                <label class="opt-label"><input type="checkbox" name="toast" value="Smoked Salmon"> Smoked Salmon (+₩3,000)</label>
            </div>

            <div class="modal-opt-group">
                <h4>Salad (Pick 1)</h4>
                <label class="opt-label"><input type="radio" name="salad" value="Greek"> Greek Salad</label>
                <label class="opt-label"><input type="radio" name="salad" value="Caprese"> Caprese Salad</label>
            </div>

            <button class="submit-btn" style="width: 100%;" onclick="confirmMYP()">Add to Order</button>
            <button class="add-btn" style="width: 100%; margin-top: 10px; border:none;" onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbyVAXSiFTvDt4u4Rl78zD9UBoODSPmt0xjn2lvrj-kfskKmBXgZqoIGAxO9GmB8taWq/exec';

        const MENU_DATA = [
            {
                category: "Brunch Plates",
                items: [
                    { name: "Vicky’s Plate", price: 14000, desc: "2 scrambled eggs, avocado, jamon, sourdough" },
                    { name: "Lina’s Plate", price: 15000, desc: "Avocado toast, bacon egg toast, mixed salad" },
                    { name: "Wendy’s Plate", price: 18000, desc: "2 salmon toasts, ricotta, capers, dill, salad" },
                    { name: "Ella’s Plate", price: 14000, desc: "Nutella banana toast, baked brie toast, granola, milk" },
                    { name: "Make Your Plate", price: 23000, desc: "Customized: Choose 2 toasts and 1 salad", isMYP: true }
                ]
            },
            {
                category: "Sandwiches",
                items: [
                    { name: "Salami Sandwich", price: 13000, desc: "Sourdough, wasabi mayo, salami, Havarti, arugula" },
                    { name: "Jamon Sandwich", price: 15000, desc: "Sourdough, fig jam, jamon, fig, romaine" },
                    { name: "Chicken Sandwich", price: 16000, desc: "Chicken, tomato, pickle, lettuce, arugula" },
                    { name: "Roasted Vegetables Sandwich", price: 16000, desc: "Pesto, eggplant, zucchini, mushroom, paprika" }
                ]
            },
            {
                category: "Coffee & Drinks",
                items: [
                    { name: "Americano (Hot/Iced)", price: 5000 },
                    { name: "Cafe Latte", price: 5500 },
                    { name: "Vanilla Latte", price: 6000 },
                    { name: "Lemon Mint Tea", price: 8000 },
                    { name: "Strawberry Smoothie", price: 7500 }
                ]
            }
        ];

        let cart = [];

        function renderMenu() {
            const container = document.getElementById('menu-list');
            let html = '';
            MENU_DATA.forEach(cat => {
                html += `<div class="category-block"><div class="category-name">${cat.category}</div>`;
                cat.items.forEach(item => {
                    html += `
                        <div class="menu-item">
                            <div class="item-info">
                                <div class="item-name">${item.name}</div>
                                <div class="item-desc">${item.desc || ''}</div>
                                <div class="item-price">₩${item.price.toLocaleString()}</div>
                            </div>
                            <button class="add-btn" onclick="handleItemClick('${item.name}')">Add</button>
                        </div>
                    `;
                });
                html += `</div>`;
            });
            container.innerHTML = html;
        }

        function handleItemClick(name) {
            if (name === "Make Your Plate") {
                document.getElementById('myp-modal').style.display = 'flex';
            } else {
                const flatMenu = MENU_DATA.flatMap(c => c.items);
                const item = flatMenu.find(i => i.name === name);
                addToCart(item.name, item.price);
            }
        }

        function confirmMYP() {
            const toasts = Array.from(document.querySelectorAll('input[name="toast"]:checked')).map(i => i.value);
            const salad = document.querySelector('input[name="salad"]:checked')?.value;

            if (toasts.length !== 2 || !salad) {
                alert("Please select exactly 2 toasts and 1 salad.");
                return;
            }

            let extra = toasts.includes("Smoked Salmon") ? 3000 : 0;
            const details = `Toasts: ${toasts.join(', ')} | Salad: ${salad}`;
            
            addToCart("Make Your Plate", 23000 + extra, details);
            closeModal();
        }

        function closeModal() {
            document.getElementById('myp-modal').style.display = 'none';
            document.querySelectorAll('input[name="toast"], input[name="salad"]').forEach(i => i.checked = false);
        }

        function addToCart(name, price, details = "") {
            cart.push({ name, price, details });
            updateCartUI();
        }

        function updateCartUI() {
            const bar = document.getElementById('cart-bar');
            const totalDisplay = document.getElementById('display-total');
            
            if (cart.length > 0) {
                bar.style.display = 'flex';
                const total = cart.reduce((sum, item) => sum + item.price, 0);
                totalDisplay.textContent = `₩${total.toLocaleString()}`;
            } else {
                bar.style.display = 'none';
            }
        }

        async function submitOrder() {
            const name = document.getElementById('g-name').value;
            const email = document.getElementById('g-email').value;
            const phone = document.getElementById('g-phone').value;

            if (!name || !email) {
                alert("Please provide your name and email.");
                return;
            }

            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.textContent = "Sending...";

            const orderData = {
                action: 'submit_order',
                name: name,
                email: email,
                phone: phone,
                items: cart,
                total: cart.reduce((sum, i) => sum + i.price, 0),
                mypDetails: cart.filter(i => i.details).map(i => i.details).join('; ')
            };

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Apps Script requires no-cors for simple POST
                    body: JSON.stringify(orderData)
                });
                
                // Show success
                document.getElementById('main-content').style.display = 'none';
                document.getElementById('cart-bar').style.display = 'none';
                document.getElementById('success-screen').style.display = 'block';
                
                let summaryHtml = `<strong>Name:</strong> ${name}<br><strong>Total:</strong> ₩${orderData.total.toLocaleString()}<br><br><strong>Items:</strong><br>`;
                cart.forEach(i => {
                    summaryHtml += `- ${i.name} ${i.details ? '('+i.details+')' : ''}<br>`;
                });
                document.getElementById('order-summary-box').innerHTML = summaryHtml;

            } catch (err) {
                alert("There was an error submitting your order. Please try again.");
                btn.disabled = false;
                btn.textContent = "Submit Order";
            }
        }

        renderMenu();
    </script>
</body>
</html>
